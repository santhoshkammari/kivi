<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unified AI Chat</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23D9774F' d='M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5'/%3E%3C/svg%3E">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    /* ===== THEME SYSTEM ===== */
    :root {
      /* Dark theme (DEFAULT) */
      --bg-body: #1F1F1E;
      --bg-sidebar: #191918;
      --bg-surface: #2B2B29;
      --bg-surface-alt: #242422;
      --bg-hover: rgba(255,255,255,0.05);
      --bg-active: rgba(255,255,255,0.08);
      --bg-input: #2B2B29;
      --bg-code-inline: rgba(255,255,255,0.08);
      --text-primary: #ECECEA;
      --text-secondary: #B4B2AC;
      --text-muted: #7A7870;
      --text-faint: #4A4944;
      --border-subtle: rgba(255,255,255,0.06);
      --border-medium: rgba(255,255,255,0.12);
      --border-strong: rgba(255,255,255,0.2);
      --msg-user-bg: #2F2F2D;
      --brand-clay: hsl(14.8, 63.1%, 59.6%);
      --brand-clay-dim: hsl(14.8, 40%, 45%);
      --green: #4a9;
      --red: #e55;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 8px rgba(0,0,0,0.4);
      --shadow-input: 0 1px 4px rgba(0,0,0,0.3);
      --sidebar-width: 280px;
      --font-ui: system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-serif: Georgia, "Times New Roman", Times, serif;
      --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    }

    [data-theme="light"] {
      --bg-body: #f8f8f6;
      --bg-sidebar: #f4f3ef;
      --bg-surface: #ffffff;
      --bg-surface-alt: #f5f5f0;
      --bg-hover: rgba(0,0,0,0.04);
      --bg-active: rgba(0,0,0,0.07);
      --bg-input: #ffffff;
      --bg-code-inline: rgba(0,0,0,0.06);
      --text-primary: #121212;
      --text-secondary: #373734;
      --text-muted: #7b7974;
      --text-faint: #c2c0b6;
      --border-subtle: rgba(31,31,30,0.1);
      --border-medium: rgba(31,31,30,0.2);
      --border-strong: rgba(31,31,30,0.35);
      --msg-user-bg: #efeee9;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.1);
      --shadow-input: 0 1px 3px rgba(0,0,0,0.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-ui);
      font-size: 16px;
      color: var(--text-primary);
      background: var(--bg-body);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      height: 100vh;
    }

    .app { display: flex; height: 100vh; overflow: hidden; }

    /* === SIDEBAR === */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-subtle);
      transition: margin-left 0.2s ease;
    }
    .sidebar.collapsed { margin-left: calc(-1 * var(--sidebar-width)); }

    /* Floating button to reopen collapsed sidebar */
    .sidebar-open-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 300;
      width: 32px; height: 32px;
      display: none;
      align-items: center; justify-content: center;
      border: 1px solid var(--border-subtle);
      background: var(--bg-sidebar);
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 8px;
      transition: opacity 0.15s ease;
    }
    .sidebar-open-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
    .sidebar.collapsed ~ .sidebar-open-btn { display: flex; }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 14px 6px;
    }
    .sidebar-logo {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .icon-btn {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border: none; background: none;
      color: var(--text-muted); cursor: pointer; border-radius: 6px;
    }
    .icon-btn:hover { background: var(--bg-hover); color: var(--text-secondary); }

    .nav-items { padding: 4px 8px; display: flex; flex-direction: column; gap: 0px; }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 8px;
      font-size: 15px; font-weight: 450; color: var(--text-secondary);
      cursor: pointer; text-decoration: none;
      border: none; background: none; width: 100%; text-align: left;
      transition: background 0.1s;
    }
    .nav-item:hover { background: var(--bg-hover); }
    .nav-item.active { background: var(--bg-active); }
    .nav-item svg { width: 17px; height: 17px; flex-shrink: 0; opacity: 0.7; }
    .nav-item .shortcut { margin-left: auto; font-size: 11px; color: var(--text-faint); }

    .nav-item-more {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 8px;
      font-size: 15px; font-weight: 450; color: var(--text-secondary);
      cursor: pointer; border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item-more:hover { background: var(--bg-hover); }
    .nav-item-more svg { width: 17px; height: 17px; flex-shrink: 0; opacity: 0.7; }

    .section-header {
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      padding: 0 16px 4px; margin-top: 16px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    .chat-list {
      flex: 1; overflow-y: auto; padding: 0 8px;
      scrollbar-width: thin; scrollbar-color: var(--border-medium) transparent;
    }
    .chat-list::-webkit-scrollbar { width: 4px; }
    .chat-list::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 4px; }

    .chat-item {
      display: flex; align-items: center; padding: 7px 10px;
      border-radius: 8px; font-size: 14px; color: var(--text-secondary);
      cursor: pointer; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; transition: background 0.1s;
    }
    .chat-item:hover { background: var(--bg-hover); }
    .chat-item.active { background: var(--bg-active); font-weight: 500; color: var(--text-primary); }

    .sidebar-bottom { margin-top: auto; padding: 4px 8px; }

    .sidebar-footer {
      padding: 12px 14px; border-top: 1px solid var(--border-subtle);
      display: flex; align-items: center; gap: 10px;
    }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--bg-surface); display: flex; align-items: center;
      justify-content: center; font-size: 13px; font-weight: 600;
      color: var(--text-secondary);
    }
    .user-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .user-plan { font-size: 12px; color: var(--text-muted); }

    /* === MAIN CONTENT === */
    .main-content {
      flex: 1; display: flex; flex-direction: column;
      height: 100vh; overflow: hidden; position: relative;
    }

    .welcome-screen {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0 16px; gap: 32px;
    }
    .welcome-screen.hidden { display: none; }

    .greeting { display: flex; align-items: center; gap: 14px; }
    .greeting h1 {
      font-family: var(--font-serif); font-size: 36px;
      font-weight: 400; color: var(--text-primary); letter-spacing: -0.02em;
    }
    @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .sparkle-icon { animation: spin-slow 8s linear infinite; color: #D97B4A; }

    .quick-actions {
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap; justify-content: center;
    }
    .quick-action {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 16px; border: 1px solid var(--border-medium);
      border-radius: 999px; background: transparent;
      font-family: var(--font-ui); font-size: 15px; font-weight: 430;
      color: var(--text-secondary); cursor: pointer;
      transition: all 0.15s;
    }
    .quick-action:hover { background: var(--bg-hover); border-color: var(--border-strong); }
    .quick-action svg { width: 16px; height: 16px; opacity: 0.65; }

    /* === MESSAGES (base - see overrides in chat header section) === */
    .message { max-width: 1000px; margin: 0 auto; padding: 4px 40px; width: 100%; }
    .messages-area.active { display: block; }
    .messages-area::-webkit-scrollbar { width: 5px; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 4px; }

    /* Thinking */
    .thinking-block {
      margin-bottom: 12px; border: 1px solid var(--border-subtle);
      border-radius: 12px; overflow: hidden; background: var(--bg-surface);
    }
    .thinking-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; cursor: pointer; user-select: none;
      font-size: 13px; font-weight: 500; color: var(--text-muted);
      background: var(--bg-surface-alt);
    }
    .thinking-header:hover { background: var(--bg-hover); }
    .thinking-header svg { width: 16px; height: 16px; transition: transform 0.2s; }
    .thinking-header.collapsed svg { transform: rotate(-90deg); }
    .thinking-body {
      padding: 12px 16px; font-size: 13px; line-height: 1.6;
      color: var(--text-muted); white-space: pre-wrap;
      max-height: 300px; overflow-y: auto;
      border-top: 1px solid var(--border-subtle);
    }
    .thinking-body.collapsed { display: none; }
    @keyframes pulse-dot { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    .thinking-dots span { animation: pulse-dot 1.4s infinite; font-size: 18px; }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

    /* Tool blocks */
    .tool-block {
      margin: 10px 0; border: 1px solid var(--border-subtle);
      border-radius: 12px; overflow: hidden; background: var(--bg-surface);
    }
    .tool-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; cursor: pointer; user-select: none;
      font-size: 13px; font-weight: 500; color: var(--text-secondary);
      transition: background 0.1s;
    }
    .tool-header:hover { background: var(--bg-hover); }
    .tool-header svg { width: 16px; height: 16px; transition: transform 0.2s; }
    .tool-header.collapsed svg { transform: rotate(-90deg); }
    .tool-icon {
      width: 24px; height: 24px; border-radius: 6px;
      background: var(--bg-surface-alt); display: flex; align-items: center;
      justify-content: center; font-size: 12px;
    }
    .tool-name { font-weight: 500; }
    .tool-status { margin-left: auto; font-size: 12px; font-weight: 400; }
    .tool-status.running { color: var(--brand-clay); }
    .tool-status.done { color: var(--green); }
    .tool-status.error { color: var(--red); }
    .tool-body { border-top: 1px solid var(--border-subtle); }
    .tool-body.collapsed { display: none; }
    .tool-section { padding: 10px 14px; font-size: 13px; line-height: 1.5; }
    .tool-section-label {
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;
    }
    .tool-section pre {
      background: var(--bg-surface-alt); border-radius: 8px; padding: 10px 12px;
      font-family: var(--font-mono); font-size: 12px;
      overflow-x: auto; color: var(--text-secondary);
      white-space: pre-wrap; word-break: break-all;
      max-height: 300px; overflow-y: auto;
    }
    .tool-section + .tool-section { border-top: 1px solid var(--border-subtle); }
    @keyframes tool-spin { to { transform: rotate(360deg); } }
    .tool-spinner {
      display: inline-block;
      width: 14px; height: 14px; border: 2px solid var(--border-medium);
      border-top-color: var(--brand-clay); border-radius: 50%;
      animation: tool-spin 0.6s linear infinite;
    }

    /* Markdown */
    .msg-content { color: var(--text-primary); }
    .msg-content h1, .msg-content h2, .msg-content h3 { margin: 16px 0 8px; font-weight: 600; color: var(--text-primary); }
    .msg-content h1 { font-size: 22px; }
    .msg-content h2 { font-size: 19px; }
    .msg-content h3 { font-size: 17px; }
    .msg-content p { margin: 8px 0; color: var(--text-primary); }
    .msg-content ul, .msg-content ol { padding-left: 24px; margin: 8px 0; }
    .msg-content li { margin: 4px 0; color: var(--text-primary); }
    .msg-content code {
      font-family: var(--font-mono); font-size: 0.875em;
      background: var(--bg-code-inline); padding: 2px 6px; border-radius: 4px;
      color: var(--text-primary);
    }
    .msg-content pre { margin: 12px 0; border-radius: 12px; overflow: hidden; background: #1a1a1a; position: relative; }
    .msg-content pre code {
      display: block; padding: 16px; background: none;
      color: #d4d4d4; overflow-x: auto; font-size: 13px; line-height: 1.5;
    }
    .code-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; background: #2d2d2d; font-size: 12px; color: #888;
    }
    .copy-btn {
      border: none; background: none; color: #888;
      cursor: pointer; font-size: 12px; font-family: var(--font-ui);
    }
    .copy-btn:hover { color: #fff; }

    /* SVG rendered preview block */
    .svg-render-block {
      margin: 12px 0; border-radius: 10px; overflow: hidden;
      border: 1px solid var(--border-subtle); background: var(--bg-surface);
    }
    .svg-render-preview {
      padding: 16px; display: flex; justify-content: center; align-items: center;
      background: transparent; min-height: 60px;
    }
    .svg-render-preview svg { max-width: 100%; height: auto; }
    .svg-render-actions {
      display: flex; gap: 8px; padding: 6px 12px;
      background: #2d2d2d; border-top: 1px solid var(--border-subtle);
    }

    /* Inline image preview block */
    .render-block {
      margin: 10px 0; border-radius: 10px; overflow: hidden;
      border: 1px solid var(--border-subtle); display: inline-block; max-width: 100%;
    }
    .render-block .render-label {
      padding: 6px 12px; font-size: 12px; color: var(--text-muted);
      background: var(--bg-surface-alt); border-bottom: 1px solid var(--border-subtle);
    }
    .render-block img, .render-block video {
      display: block; max-width: 100%; max-height: 500px; object-fit: contain;
    }
    .render-block .render-text-content {
      padding: 12px; font-size: 13px; max-height: 400px; overflow: auto;
      background: var(--bg-surface); color: var(--text-primary);
    }
    .render-error {
      padding: 16px; color: var(--text-muted); font-size: 13px; text-align: center;
    }

    .msg-content a { color: var(--brand-clay); text-decoration: underline; }
    .msg-content blockquote {
      border-left: 3px solid var(--border-strong); padding-left: 12px;
      margin: 8px 0; color: var(--text-muted);
    }
    .msg-content table { border-collapse: collapse; margin: 12px 0; width: 100%; }
    .msg-content th, .msg-content td {
      border: 1px solid var(--border-medium); padding: 8px 12px; text-align: left; font-size: 14px;
    }
    .msg-content th { background: var(--bg-surface-alt); font-weight: 600; }

    /* === INPUT AREA === */
    /* Welcome: ~674px box. Chat: ~754px box (max-w-3xl=768px) */
    .input-area { padding: 0 0 20px; max-width: 960px; margin: 0 auto; width: 100%; }
    .welcome-screen .input-area { max-width: 860px; }

    .input-box {
      background: var(--bg-input);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 2px 6px rgba(0,0,0,0.25);
      transition: border-color 0.2s, box-shadow 0.2s;
      position: relative; overflow: visible;
    }
    .input-box:focus-within {
      border-color: rgba(255,255,255,0.13);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 2px 10px rgba(0,0,0,0.3);
    }

    /* Inner wrapper: m-3.5=14px margin, gap-3=12px */
    .input-inner {
      margin: 14px;
      display: flex; flex-direction: column;
      gap: 12px;
    }

    /* File chips */
    .file-chips {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 0; max-height: 0; overflow: hidden;
      transition: all 0.2s;
    }
    .file-chips.has-files { padding: 0 0 8px; max-height: 200px; }
    .file-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 10px; background: var(--bg-surface-alt);
      border: 1px solid var(--border-subtle); border-radius: 8px;
      font-size: 12px; color: var(--text-secondary);
    }
    .file-chip img {
      width: 24px; height: 24px; border-radius: 4px; object-fit: cover;
    }
    .file-chip .remove-file {
      cursor: pointer; color: var(--text-muted); font-size: 14px;
      margin-left: 2px; border: none; background: none; padding: 0;
    }
    .file-chip .remove-file:hover { color: var(--red); }

    .input-textarea {
      width: 100%; min-height: 24px; max-height: 384px;
      padding: 6px 6px 0; border: none; outline: none; resize: none;
      font-family: var(--font-ui); font-size: 1.0625rem; font-weight: 400;
      color: var(--text-primary); background: transparent; line-height: 1.4;
      overflow-y: auto; display: block;
    }
    .input-textarea::placeholder { color: rgba(255,255,255,0.3); font-weight: 400; }

    .input-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      min-height: 36px; padding: 2px 0; flex-wrap: wrap; gap: 4px;
    }
    .toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 4px; }

    .toolbar-btn {
      width: 32px; height: 32px; display: flex;
      align-items: center; justify-content: center;
      border: none; background: none; color: var(--text-muted);
      cursor: pointer; border-radius: 8px;
    }
    .toolbar-btn:hover { background: var(--bg-hover); color: var(--text-secondary); }

    /* Mode toggle */
    .mode-toggle {
      display: flex; background: var(--bg-surface-alt);
      border-radius: 8px; padding: 2px; margin-left: 4px;
      border: 1px solid var(--border-subtle);
    }
    .mode-btn {
      padding: 4px 14px; border: none; background: none;
      border-radius: 6px; font-size: 13px; font-weight: 500;
      color: var(--text-muted); cursor: pointer;
      transition: all 0.15s; font-family: var(--font-ui);
      white-space: nowrap;
    }
    .mode-btn.active {
      background: var(--bg-body); color: var(--text-primary);
      box-shadow: var(--shadow-sm);
    }
    .mode-btn:hover:not(.active) { color: var(--text-secondary); }

    /* Sampling badge */
    .sampling-badge {
      padding: 3px 8px; border-radius: 6px;
      font-size: 11px; font-weight: 500;
      color: var(--brand-clay); background: rgba(217,119,79,0.1);
      border: 1px solid rgba(217,119,79,0.2);
      cursor: pointer; font-family: var(--font-ui); white-space: nowrap;
    }
    .sampling-badge:hover { background: rgba(217,119,79,0.15); }

    .model-selector {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 0 10px; height: 34px; border: 1px solid var(--border); background: var(--bg-main);
      font-family: var(--font-ui); font-size: 14px; font-weight: 400;
      color: rgba(255,255,255,0.7); cursor: pointer; border-radius: 8px;
      white-space: nowrap; max-width: 160px;
    }
    .model-selector:hover { background: var(--bg-hover); color: rgba(255,255,255,0.8); }
    .model-selector option { background: var(--bg-main); color: var(--text-main); }

    .send-btn {
      width: 34px; height: 34px; display: flex;
      align-items: center; justify-content: center;
      border: none; background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.35);
      cursor: pointer; border-radius: 50%; transition: all 0.15s; flex-shrink: 0;
    }
    .send-btn:hover { background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.7); }
    .send-btn.active { background: #fff; color: #1a1a18; }
    .send-btn.streaming { background: #fff; color: #1a1a18; }
    .stop-icon { width: 10px; height: 10px; background: #1a1a18; border-radius: 2px; }

    /* === SETTINGS MODAL === */
    .settings-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: none; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .settings-overlay.open { display: flex; }

    .settings-panel {
      background: var(--bg-surface); border-radius: 16px;
      width: 420px; max-height: 80vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border: 1px solid var(--border-medium);
    }
    .settings-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px; border-bottom: 1px solid var(--border-subtle);
    }
    .settings-header h2 { font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .settings-close {
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      border: none; background: none; color: var(--text-muted);
      cursor: pointer; border-radius: 6px; font-size: 18px;
    }
    .settings-close:hover { background: var(--bg-hover); }

    .settings-body { padding: 16px 20px; }

    .settings-group { margin-bottom: 20px; }
    .settings-group label {
      display: block; font-size: 13px; font-weight: 500;
      color: var(--text-secondary); margin-bottom: 8px;
    }
    .settings-group .hint {
      font-size: 11px; color: var(--text-muted); margin-top: 4px;
    }

    .theme-toggle {
      display: flex; background: var(--bg-surface-alt);
      border-radius: 10px; padding: 3px; border: 1px solid var(--border-subtle);
    }
    .theme-btn {
      flex: 1; padding: 8px 16px; border: none; background: none;
      border-radius: 8px; font-size: 13px; font-weight: 500;
      color: var(--text-muted); cursor: pointer;
      transition: all 0.15s; font-family: var(--font-ui);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .theme-btn.active {
      background: var(--bg-body); color: var(--text-primary);
      box-shadow: var(--shadow-sm);
    }

    .settings-select {
      width: 100%; padding: 8px 12px; border-radius: 8px;
      border: 1px solid var(--border-medium); background: var(--bg-surface-alt);
      color: var(--text-primary); font-size: 13px; font-family: var(--font-ui);
      cursor: pointer; outline: none;
    }
    .settings-select:focus { border-color: var(--brand-clay); }
    .settings-select option { background: var(--bg-surface); color: var(--text-primary); }

    .param-display {
      margin-top: 8px; padding: 8px 12px; border-radius: 8px;
      background: var(--bg-surface-alt); font-family: var(--font-mono);
      font-size: 12px; color: var(--text-muted); line-height: 1.6;
    }

    /* === CHAT HEADER === */
    .chat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px; border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0; min-height: 48px;
    }
    .chat-title-wrapper {
      display: flex; align-items: center; gap: 6px;
      cursor: pointer; padding: 4px 8px; border-radius: 8px;
      transition: background 0.1s;
    }
    .chat-title-wrapper:hover { background: var(--bg-hover); }
    .chat-title-text {
      font-size: 15px; font-weight: 500; color: var(--text-primary);
      max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .share-btn {
      padding: 6px 16px; border: 1px solid var(--border-medium);
      border-radius: 8px; background: none; font-family: var(--font-ui);
      font-size: 13px; font-weight: 500; color: var(--text-secondary);
      cursor: pointer; transition: all 0.15s;
    }
    .share-btn:hover { background: var(--bg-hover); border-color: var(--border-strong); color: var(--text-primary); }

    /* Fix user bubble */
    .message-user { display: flex; justify-content: flex-end; padding: 4px 40px 4px 80px; max-width: 1000px; margin: 0 auto; width: 100%; }
    .message-user .msg-bubble {
      background: #2F2F2D; border-radius: 18px;
      padding: 10px 16px; max-width: 80%;
      font-size: 16px; line-height: 1.6; color: var(--text-primary);
      word-break: break-word;
    }
    [data-theme="light"] .message-user .msg-bubble { background: #e8e7e1; }

    /* Fix assistant message layout */
    .message-assistant { padding: 4px 40px; max-width: 1000px; margin: 0 auto; width: 100%; }
    .message-assistant .msg-content {
      font-size: 16px; line-height: 1.75; color: var(--text-primary);
    }
    .message-assistant .msg-content p { color: var(--text-primary); }
    .message-assistant .msg-content a { color: var(--brand-clay); }

    /* Message action buttons */
    .msg-actions {
      display: flex; align-items: center; gap: 2px;
      margin-top: 8px; opacity: 0;
      transition: opacity 0.15s;
    }
    .message-assistant:hover .msg-actions { opacity: 1; }
    .msg-action-btn {
      width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
      border: none; background: none; color: var(--text-muted);
      cursor: pointer; border-radius: 8px; transition: all 0.1s;
    }
    .msg-action-btn:hover { background: var(--bg-hover); color: var(--text-secondary); }
    .msg-action-btn svg { width: 15px; height: 15px; }

    /* Messages area layout */
    .messages-area {
      flex: 1; overflow-y: auto; padding: 16px 0 8px;
      display: none;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--bg-surface); color: var(--text-primary);
      padding: 10px 16px; border-radius: 10px; font-size: 14px;
      z-index: 999; opacity: 0; transform: translateY(10px);
      transition: all 0.3s; border: 1px solid var(--border-medium);
      box-shadow: var(--shadow-md);
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* Git diff styles */
    .diff-file { margin-bottom:16px; border:1px solid var(--border-subtle); border-radius:10px; overflow:hidden; }
    .diff-file-header { padding:8px 14px; background:var(--bg-secondary); font-weight:500; font-size:13px; display:flex; align-items:center; gap:8px; cursor:pointer; border-bottom:1px solid var(--border-subtle); }
    .diff-file-header .badge { padding:1px 6px; border-radius:4px; font-size:11px; font-weight:600; }
    .diff-file-header .badge-add { background:rgba(138,171,104,0.2); color:var(--green); }
    .diff-file-header .badge-mod { background:rgba(122,174,224,0.2); color:var(--blue); }
    .diff-file-header .badge-del { background:rgba(224,90,69,0.2); color:var(--red); }
    .diff-file-header .badge-new { background:rgba(168,150,212,0.2); color:var(--purple); }
    .diff-lines { font-family:var(--font-mono); font-size:12px; line-height:1.5; overflow-x:auto; }
    .diff-line { display:flex; white-space:pre; min-height:20px; }
    .diff-line-num { width:45px; min-width:45px; text-align:right; padding:0 8px; color:var(--text-muted); user-select:none; opacity:0.5; }
    .diff-line-content { flex:1; padding:0 10px; }
    .diff-line-add { background:rgba(138,171,104,0.12); }
    .diff-line-add .diff-line-content { color:var(--green); }
    .diff-line-del { background:rgba(224,90,69,0.1); }
    .diff-line-del .diff-line-content { color:var(--red); }
    .diff-line-hunk { background:rgba(122,174,224,0.08); color:var(--blue); font-style:italic; }
    .diff-line-ctx { opacity:0.7; }
    .git-repo-card { padding:12px 14px; border-radius:10px; border:1px solid var(--border-subtle); background:var(--bg-secondary); cursor:pointer; font-size:13px; transition:all 0.15s; min-width:180px; }
    .git-repo-card:hover { border-color:var(--brand-clay); background:var(--bg-hover); }
    .git-repo-card .path { font-family:var(--font-mono); color:var(--text-muted); font-size:11px; margin-top:4px; }
    .git-search-item { padding:10px 14px; cursor:pointer; font-size:13px; font-family:var(--font-mono); border-bottom:1px solid var(--border-subtle); }
    .git-search-item:hover { background:var(--bg-hover); }
    .git-search-item:last-child { border-bottom:none; }

    /* Token dashboard */
    .tkn-period { padding:5px 14px; border:none; background:none; border-radius:7px; font-size:13px; font-weight:500; color:var(--text-muted); cursor:pointer; font-family:var(--font-ui); transition:all 0.15s; }
    .tkn-period.active { background:var(--bg-body); color:var(--text-primary); box-shadow:var(--shadow-sm); }
    .tkn-period:hover:not(.active) { color:var(--text-secondary); }
    .tkn-card { padding:16px; border-radius:12px; border:1px solid var(--border-subtle); background:var(--bg-secondary); }
    .tkn-card .label { font-size:12px; color:var(--text-muted); margin-bottom:6px; font-weight:500; text-transform:uppercase; letter-spacing:0.5px; }
    .tkn-card .value { font-size:24px; font-weight:600; color:var(--text-primary); font-family:var(--font-mono); }
    .tkn-card .sub { font-size:11px; color:var(--text-muted); margin-top:4px; }

    /* Chatbox suggestion dropdown */
    .suggest-dropdown {
      position: absolute; bottom: 100%; left: 0; right: 0;
      background: var(--bg-surface); border: 1px solid var(--border-medium);
      border-radius: 10px; max-height: 220px; overflow-y: auto;
      z-index: 500; display: none; margin-bottom: 6px;
      box-shadow: var(--shadow-md);
    }
    .suggest-dropdown.visible { display: block; }

    /* Ghost text inline autocomplete overlay */
    .ghost-text-wrapper { position: relative; }
    .ghost-text-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 0; overflow: hidden;
      white-space: pre-wrap; word-wrap: break-word;
      font-family: var(--font-ui); font-size: 1.0625rem; font-weight: 400;
      line-height: 1.4;
      padding: 6px 6px 0; box-sizing: border-box; color: transparent;
    }
    .ghost-text-overlay .ghost-typed { color: transparent; }
    .ghost-text-overlay .ghost-completion { color: rgba(255,255,255,0.25); }

    .suggest-item {
      padding: 8px 14px; cursor: pointer; font-size: 13px;
      display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid var(--border-subtle);
      transition: background 0.1s;
    }
    .suggest-item:last-child { border-bottom: none; }
    .suggest-item:hover, .suggest-item.active { background: var(--bg-hover); }
    .suggest-item .icon { opacity: 0.5; font-size: 12px; flex-shrink: 0; }
    .suggest-item .text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .suggest-item .hint { color: var(--text-muted); font-size: 11px; flex-shrink: 0; }
    .suggest-file { font-family: var(--font-mono); font-size: 12px; }
    .suggest-word { font-weight: 500; }
    .git-commit-item { padding:8px 12px; display:flex; gap:10px; font-size:12px; border-bottom:1px solid var(--border-subtle); }
    .git-commit-item:last-child { border-bottom:none; }
    .git-commit-sha { color:var(--blue); font-family:var(--font-mono); min-width:60px; }
    .git-commit-msg { flex:1; }
    .git-commit-meta { color:var(--text-muted); white-space:nowrap; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 4px; }
  </style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">Claude</span>
      <button class="icon-btn" onclick="toggleSidebar()" title="Toggle sidebar">

      </button>
    </div>

    <nav class="nav-items">

        New chat
        <span class="shortcut">Ctrl+N</span>
      </button>
      <button class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search
      </button>
      <button class="nav-item" onclick="showChatsDashboard()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>

      </button>
      <button class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Projects
      </button>
      <button class="nav-item" onclick="showGitDashboard()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><line x1="12" y1="3" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="21"/><line x1="3" y1="12" x2="9" y2="12"/></svg>

      </button>
      <button class="nav-item" onclick="showTokenDashboard()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Tokens
      </button>
      <button class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>

      </button>
      <button class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Customize
      </button>
      <button class="nav-item-more" onclick="this.querySelector('svg:last-child').style.transform = this.querySelector('svg:last-child').style.transform === 'rotate(180deg)' ? '' : 'rotate(180deg)'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:17px;height:17px;opacity:0.7"><polyline points="6 9 12 15 18 9"/></svg>
        More
      </button>
    </nav>

    <h2 class="section-header">Starred</h2>
    <div class="chat-list" style="flex:none;max-height:60px;overflow:hidden;padding:0 8px">
    </div>

    <h2 class="section-header">Recents</h2>
    <div class="chat-list" id="chatList"></div>

    <div class="sidebar-bottom">
      <button class="nav-item" onclick="openSettings()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </button>
    </div>

    <div class="sidebar-footer">
      <div class="user-avatar" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">S</div>

        <div class="user-plan">Pro plan</div>
      </div>
      <svg style="width:18px;height:18px;color:var(--text-muted);cursor:pointer;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 10l5 5 5-5"/></svg>

  <!-- Floating sidebar open button (visible when sidebar collapsed) -->

  </button>

  <!-- Main -->
  <div class="main-content">
    <!-- Chat header (shown when in chat mode) -->

      <div class="chat-title-wrapper">

      </div>
      <button class="share-btn" onclick="showToast('Share copied!')">Share</button>
    </div>
    <!-- Welcome -->
    <div class="welcome-screen" id="welcomeScreen">
      <div class="greeting">
        <svg class="sparkle-icon" width="38" height="38" viewBox="0 0 40 40" fill="none">
          <path d="M20 4L22.5 15.5L34 12L24.5 20L34 28L22.5 24.5L20 36L17.5 24.5L6 28L15.5 20L6 12L17.5 15.5L20 4Z" fill="currentColor"/>
        </svg>
        <h1 id="greetingText">Welcome to Kivi</h1>

      <div class="input-area" id="welcomeInputArea">
        <div class="input-box">
          <div class="suggest-dropdown" id="welcomeSuggest"></div>
          <div class="input-inner" style="position:relative;">

          <div class="ghost-text-wrapper" style="position:relative;">

          </div>
          <div class="input-toolbar">
            <div class="toolbar-left">

              <input type="file" id="welcomeFileInput" multiple accept="image/*,.txt,.py,.js,.ts,.json,.md,.csv,.html,.css,.xml,.yaml,.yml,.toml,.sh,.rs,.go,.java,.c,.cpp,.h,.rb,.php,.sql" hidden>

                <button class="mode-btn" data-mode="claude" onclick="setMode('claude')">Claude</button>

          </div>

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a7 7 0 0 1 7 7c0 2.38-1.19 4.47-3 5.74V17a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 0 1 7-7z"/><line x1="10" y1="22" x2="14" y2="22"/></svg>
          Learn
        </button>
        <button class="quick-action" onclick="sendQuickAction('Write a Python function to sort a list')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          Code
        </button>
        <button class="quick-action" onclick="sendQuickAction('Help me organize my life and plan my tasks')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          Life stuff

// Provider → mode mapping (for display)
const MODE_TO_PROVIDER = {

  'qwen-copilot': 'qwen-copilot', claude: 'claude', 'qwen-claude': 'qwen-claude',

const MODE_COLORS = {

  'qwen-copilot':'#d29922', claude:'#c49cde', 'qwen-claude':'#d97706',

};
const MODE_LABELS = {
  vllm:'vLLM', chat:'vLLM', kivi:'Kivi', copilot:'Copilot',

// ===== STATE =====
let sessions = [];       // loaded from server

let isStreaming = false;

// ===== INIT THEME =====

// ===== MARKED CONFIG =====
marked.setOptions({
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
    return hljs.highlightAuto(code).value;
  },
  breaks: true, gfm: true,
});

const renderer = new marked.Renderer();
renderer.code = function(obj) {
  const code = typeof obj === 'object' ? obj.text : obj;
  const lang = typeof obj === 'object' ? (obj.lang || '') : (arguments[1] || '');

  // SVG rendering — show rendered SVG + collapsible source
  if (lang === 'svg' || (lang === '' && code.trimStart().startsWith('<svg'))) {
    const id = 'svg-' + Math.random().toString(36).substr(2, 9);
    const codeId = 'code-' + Math.random().toString(36).substr(2, 9);
    const highlighted = hljs.highlight(code, { language: 'xml' }).value;
    return '<div class="svg-render-block">' +
      '<div class="svg-render-preview" id="' + id + '">' + code + '</div>' +
      '<div class="svg-render-actions">' +
        '<button class="copy-btn" onclick="copyCode(\'' + codeId + '\')">Copy SVG</button>' +
        '<button class="copy-btn" onclick="var s=document.getElementById(\'' + codeId + '-wrap\');s.style.display=s.style.display===\'none\'?\'block\':\'none\';this.textContent=s.style.display===\'none\'?\'Show Code\':\'Hide Code\'">Show Code</button>' +
      '</div>' +
      '<pre id="' + codeId + '-wrap" style="display:none;margin-top:8px;"><div class="code-header"><span>svg</span></div><code id="' + codeId + '" class="hljs language-xml">' + highlighted + '</code></pre>' +
    '</div>';
  }

  const highlighted = lang && hljs.getLanguage(lang)
    ? hljs.highlight(code, { language: lang }).value
    : hljs.highlightAuto(code).value;
  const id = 'code-' + Math.random().toString(36).substr(2, 9);
  return '<pre><div class="code-header"><span>' + (lang || 'code') + '</span><button class="copy-btn" onclick="copyCode(\'' + id + '\')">Copy</button></div><code id="' + id + '" class="hljs language-' + lang + '">' + highlighted + '</code></pre>';
};
marked.use({ renderer });

// ── LaTeX rendering with KaTeX ──────────────────────────────────────
function renderLatex(html) {
  if (typeof katex === 'undefined') return html;
  // Block math: $$...$$ (including multiline)
  html = html.replace(/\$\$([\s\S]+?)\$\$/g, function(m, tex) {
    try { return katex.renderToString(tex.trim(), { displayMode: true, throwOnError: false }); }
    catch(e) { return m; }
  });
  // Inline math: $...$ (not $$, not inside code tags)
  html = html.replace(/(?<!\$)\$(?!\$)([^\$\n]+?)\$(?!\$)/g, function(m, tex) {
    try { return katex.renderToString(tex.trim(), { displayMode: false, throwOnError: false }); }
    catch(e) { return m; }
  });
  // \[...\] block math
  html = html.replace(/\\\[([\s\S]+?)\\\]/g, function(m, tex) {
    try { return katex.renderToString(tex.trim(), { displayMode: true, throwOnError: false }); }
    catch(e) { return m; }
  });
  // \(...\) inline math
  html = html.replace(/\\\(([\s\S]+?)\\\)/g, function(m, tex) {
    try { return katex.renderToString(tex.trim(), { displayMode: false, throwOnError: false }); }
    catch(e) { return m; }
  });
  return html;
}

function renderMarkdown(text) {
  // Process <render_inline> tags BEFORE markdown parsing (preserve them as placeholders)
  const renderSlots = [];
  text = text.replace(/<render_inline\s+type="(image|video|text|file)"\s+src="([^"]+)"\s*\/?>/gi, function(match, type, filepath) {
    const idx = renderSlots.length;
    const encoded = encodeURIComponent(filepath);
    const fname = filepath.split('/').pop();
    let replacement;
    if (type === 'image') {
      replacement = '<div class="render-block render-image">' +
        '<div class="render-label">📷 ' + fname + '</div>' +
        '<img src="/api/file-preview?path=' + encoded + '" alt="' + fname + '" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=render-error>⚠️ Could not load: ' + fname + '</div>\'">' +
      '</div>';
    } else if (type === 'video') {
      replacement = '<div class="render-block render-video">' +
        '<div class="render-label">🎬 ' + fname + '</div>' +
        '<video controls preload="metadata" style="max-width:100%;max-height:500px;">' +
          '<source src="/api/file-preview?path=' + encoded + '">' +
          'Video not supported' +
        '</video>' +
      '</div>';
    } else if (type === 'text') {
      replacement = '<div class="render-block render-text">' +
        '<div class="render-label">📄 ' + fname + '</div>' +
        '<pre class="render-text-content">Loading...</pre>' +
      '</div>';
    } else {
      replacement = '<div class="render-block">' +
        '<div class="render-label">📎 <a href="/api/file-preview?path=' + encoded + '" target="_blank">' + fname + '</a></div>' +
      '</div>';
    }
    renderSlots.push(replacement);
    return '%%RENDER_SLOT_' + idx + '%%';
  });

  let html = renderLatex(marked.parse(text));

  // Restore render slots
  html = html.replace(/%%RENDER_SLOT_(\d+)%%/g, (m, idx) => renderSlots[parseInt(idx)] || '');

  // Strip raw <svg> that leaked through markdown as live HTML.
  html = html.replace(/<svg\b[^>]*>[\s\S]*?<\/svg>/gi, function(match, offset, str) {
    const before = str.substring(Math.max(0, offset - 200), offset);
    if (before.includes('svg-render-preview')) return match;
    return '<pre><code>' + match.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</code></pre>';
  });
  return html;
}

function setTheme(theme) {
  currentTheme = theme;
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('unified_theme', theme);
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === theme));

async function setMode(mode) {
  currentMode = mode;
  localStorage.setItem('unified_mode', mode);
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  const placeholders = {
    vllm: ['How can I help you today?', 'Reply to Claude...'],
    chat: ['How can I help you today?', 'Reply to Claude...'],
    kivi: ['Ask Kivi to help with code...', 'Ask Kivi...'],
    copilot: ['Ask Copilot anything...', 'Ask Copilot...'],
    'qwen-copilot': ['Ask QCopilot anything...', 'Ask QCopilot...'],
    claude: ['Ask Claude anything...', 'Ask Claude...'],
    'qwen-claude': ['Ask QClaude anything...', 'Ask QClaude...'],
  };
  const [ph, phChat] = placeholders[mode] || placeholders.vllm;
  document.getElementById('welcomeInput').placeholder = ph;
  document.getElementById('chatInput').placeholder = phChat;
  await updateModelSelectors();
  await syncCurrentSessionConfig(mode, currentModelId);
}

async function selectModel(modelId) {
  currentModelId = modelId;
  document.querySelectorAll('.model-selector').forEach(s => s.value = modelId);
  await syncCurrentSessionConfig(currentMode, modelId);
}

async function loadModelsForProvider(provider) {
  if (_providerModels[provider]) return _providerModels[provider];
  try {
    const resp = await fetch('/api/models/' + encodeURIComponent(provider));
    const models = await resp.json();
    if (Array.isArray(models)) {
      _providerModels[provider] = models;
      return models;
    }
  } catch(e) { console.warn('Failed to load models for', provider, e); }
  return [];
}

async function updateModelSelectors() {
  const provider = MODE_TO_PROVIDER[currentMode] || 'vllm';
  const models = await loadModelsForProvider(provider);

  document.querySelectorAll('.model-selector').forEach(sel => {
    sel.innerHTML = '';
    if (models.length > 0) {
      for (const m of models) {
        const opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.name || m.id;
        sel.appendChild(opt);
      }
      const preferred = models.find(m => m.id === currentModelId) ||
                        models.find(m => m.id === 'gpt-4.1') ||
                        models.find(m => m.id === 'haiku') ||
                        models[0];
      if (preferred) currentModelId = preferred.id;
    } else if (currentMode === 'vllm' || currentMode === 'chat' || currentMode === 'kivi') {
      sel.innerHTML = '<option value="default">Default Model</option>';
      currentModelId = 'default';
    } else if (currentMode === 'copilot' || currentMode === 'qwen-copilot') {
      sel.innerHTML = '<option value="gpt-4.1">GPT-4.1</option>';
      currentModelId = 'gpt-4.1';
    } else if (currentMode === 'claude' || currentMode === 'qwen-claude') {
      sel.innerHTML = '<option value="haiku">Haiku</option><option value="sonnet">Sonnet</option><option value="opus">Opus</option>';
      currentModelId = 'haiku';
    } else {
      sel.innerHTML = '<option value="default">Default Model</option>';
      currentModelId = 'default';
    }
    sel.value = currentModelId;
  });
}

async function syncCurrentSessionConfig(mode = currentMode, model = currentModelId) {
  if (!currentSessionId || currentSessionId.startsWith('temp-') || isStreaming) return;
  const provider = MODE_TO_PROVIDER[mode] || 'vllm';
  const session = getSession(currentSessionId);
  if (!session) return;
  const currentProvider = session.provider || MODE_TO_PROVIDER[session.mode] || 'vllm';
  if (currentProvider === provider && session.model === model) return;
  try {
    await fetch('/api/sessions/' + encodeURIComponent(currentSessionId) + '/switch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ provider, model }),
    });
    session.provider = provider;
    session.model = model;
    session.mode = mode;
    session.updated_at = new Date().toISOString();
    renderChatList();
  } catch (e) {
    console.warn('Failed to sync session config:', e);
  }
}

// ===== FILE UPLOAD =====
function triggerUpload(ctx) {
  const el = document.getElementById(ctx + 'FileInput');
  if (el) el.click();

function handleFileUpload(ctx, files) {
  for (const file of files) {
    const reader = new FileReader();
    if (file.type.startsWith('image/')) {
      reader.onload = (e) => {
        uploadedFiles[ctx].push({ name: file.name, data: e.target.result, type: 'image' });
        renderFileChips(ctx);
      };
      reader.readAsDataURL(file);
    } else {
      reader.onload = (e) => {
        uploadedFiles[ctx].push({ name: file.name, data: e.target.result, type: 'text' });
        renderFileChips(ctx);
      };
      reader.readAsText(file);
    }
  }
}

  const el = document.getElementById(ctx + 'FileChips');
  if (!el) return;
  const files = uploadedFiles[ctx];

      : '<span style="margin-right:4px;">📎</span>';
    return '<span class="file-chip">' + preview + esc(f.name) +
      '<span onclick="removeFile(\'' + ctx + '\',' + i + ')" style="cursor:pointer;margin-left:4px;opacity:0.6;">✕</span></span>';
  }).join('');
}

async function createSession(firstMessage) {
  const provider = MODE_TO_PROVIDER[currentMode] || 'vllm';
  const title = firstMessage.substring(0, 50) + (firstMessage.length > 50 ? '...' : '');
  try {
    const resp = await fetch('/api/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ provider, model: currentModelId, title }),
    });
    const data = await resp.json();
    const session = { id: data.id, title, provider, model: currentModelId, mode: currentMode, created_at: Date.now(), updated_at: Date.now() };
    sessions.unshift(session);
    currentSessionId = data.id;
    currentMessages = [];
    renderChatList();
    return data.id;
  } catch(e) {
    console.error('createSession error:', e);
    // Fallback: use temp ID, server will create on first stream
    const id = 'temp-' + Date.now();
    sessions.unshift({ id, title, mode: currentMode, created_at: Date.now() });
    currentSessionId = id;
    currentMessages = [];
    renderChatList();
    return null; // null means let server create
  }
}

async function switchToChat(id) {
  document.getElementById('gitDashboard').style.display = 'none';
  document.getElementById('tokenDashboard').style.display = 'none';
  const chatsDash = document.getElementById('chatsDashboard');
  if (chatsDash) chatsDash.style.display = 'none';
  document.getElementById('messagesArea').style.display = '';

  currentSessionId = id;
  isStreaming = false;
  abortController = null;
  stopRequested = false;

  // Load messages from server
  try {
    const resp = await fetch('/api/sessions/' + encodeURIComponent(id) + '/messages');
    currentMessages = await resp.json();
  } catch(e) {
    console.warn('Failed to load messages:', e);
    currentMessages = [];
  }

  // Update UI
  document.getElementById('welcomeScreen').classList.add('hidden');
  document.getElementById('messagesArea').classList.add('active');
  document.getElementById('chatInputArea').style.display = '';
  document.getElementById('chatHeader').style.display = '';

  const session = getSession(id);
  const title = session?.title || 'Chat';
  document.getElementById('chatTitleText').textContent = title;

  // Set mode/model from session
  if (session) {
    const providerToMode = { vllm: 'vllm', copilot: 'copilot', 'qwen-copilot': 'qwen-copilot', claude: 'claude', 'qwen-claude': 'qwen-claude' };
    const mode = providerToMode[session.provider] || session.mode || 'vllm';
    if (session.model) currentModelId = session.model;
    if (mode !== currentMode) {
      await setMode(mode);
    } else {
      await updateModelSelectors();

    document.querySelectorAll('.model-selector').forEach(sel => { sel.value = currentModelId; });
  }

  // Render messages
  renderMessages();
  renderChatList();
  updateSendButton();

  document.getElementById('chatInput')?.focus();

// ===== UNIFIED STREAMING =====
async function sendMessage(text) {
  if (!text.trim() || isStreaming) return;

  // Save to message history
  _msgHistory.unshift(text);
  if (_msgHistory.length > 500) _msgHistory.length = 500;
  _msgHistoryIdx = -1;
  _msgHistoryDraft = '';
  _sentenceTrieInsert(text);
  try { localStorage.setItem('unified_msg_history', JSON.stringify(_msgHistory.slice(0, 200))); } catch(e) {}

  // Gather uploaded files
  const ctx = currentSessionId ? 'chat' : 'welcome';
  const files = [...uploadedFiles[ctx]];
  uploadedFiles[ctx] = [];
  renderFileChips(ctx);

  if (!currentSessionId) {
    await createSession(text);
    document.getElementById('welcomeScreen').classList.add('hidden');
    document.getElementById('messagesArea').classList.add('active');
    document.getElementById('chatInputArea').style.display = '';
    document.getElementById('chatHeader').style.display = '';
    document.getElementById('chatTitleText').textContent = text.substring(0, 50) + (text.length > 50 ? '...' : '');
  }

  // Build user content (multimodal if images)
  let userContent;
  const imageFiles = files.filter(f => f.type === 'image');
  const textFiles = files.filter(f => f.type === 'text');
  let fullText = text;
  if (textFiles.length) {
    fullText += '\n\n' + textFiles.map(f => '--- ' + f.name + ' ---\n' + f.data).join('\n\n');
  }
  if (imageFiles.length) {
    userContent = [{ type: 'text', text: fullText }];
    for (const img of imageFiles) {
      userContent.push({ type: 'image_url', image_url: { url: img.data } });
    }
  } else {
    userContent = fullText;
  }

  currentMessages.push({ role: 'user', content: userContent });
  appendUserMessage(userContent);

  document.getElementById('welcomeInput').value = '';
  document.getElementById('chatInput').value = '';
  autoResize(document.getElementById('chatInput'));

  await streamUnified();
}

// Single unified streaming function for ALL providers
async function streamUnified() {
  const streamSessionId = currentSessionId;
  const isActive = () => currentSessionId === streamSessionId;
  if (isActive()) { isStreaming = true; stopRequested = false; updateSendButton(); }
  const myAbort = new AbortController();
  if (isActive()) abortController = myAbort;
  _chatStreaming[streamSessionId] = { abortController: myAbort, stopRequested: false };
  const _detachedArea = document.createElement('div');
  const getTargetArea = () => isActive() ? null : _detachedArea;

  const msgEl = createAssistantMessageEl(getTargetArea());
  const thinkingBlock = msgEl.querySelector('#currentThinking') || msgEl.querySelector('.thinking-block');
  const thinkingBody = msgEl.querySelector('#currentThinkingBody') || msgEl.querySelector('.thinking-body');
  const thinkingLabel = msgEl.querySelector('.thinking-label');
  const thinkingDots = msgEl.querySelector('.thinking-dots');
  const contentEl = msgEl.querySelector('#currentContent') || msgEl.querySelector('.msg-content');
  const toolCallsEl = msgEl.querySelector('#currentToolCalls') || msgEl.querySelector('.tool-calls-container');
  const safeScroll = () => { if (isActive()) scrollToBottom(); };

  let content = '', reasoning = '';
  let thinkingStartTime = Date.now();
  let costInfo = null;
  const _toolDivs = {};
  const _toolCalls = [];

  // Build messages for API
  const provider = MODE_TO_PROVIDER[currentMode] || 'vllm';
  const apiMessages = currentMessages.map(m => ({ role: m.role, content: m.content }));

  const sampling = SAMPLING_MODES[currentSamplingMode];

  try {
    const body = {
      provider,
      model: currentModelId,
      messages: apiMessages,
      system_prompt: SYSTEM_PROMPTS[currentMode],
      temperature: sampling.temperature,
    };
    if (streamSessionId && !streamSessionId.startsWith('temp-')) {
      body.session_id = streamSessionId;
    }

    const response = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: myAbort.signal,
    });

    if (!response.ok) throw new Error('API error ' + response.status + ': ' + await response.text());

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const chunk = JSON.parse(data);

          if (chunk.type === 'session') {
            // Server assigned/confirmed session_id
            if (chunk.session_id && (!currentSessionId || currentSessionId.startsWith('temp-'))) {
              const previousId = currentSessionId;
              currentSessionId = chunk.session_id;
              const tempIndex = previousId ? sessions.findIndex(s => s.id === previousId) : -1;
              const existing = sessions.find(s => s.id === chunk.session_id);
              if (tempIndex >= 0) {
                sessions[tempIndex] = { ...(sessions[tempIndex] || {}), id: chunk.session_id, provider, mode: currentMode, model: currentModelId, updated_at: new Date().toISOString() };
              } else if (!existing) {
                sessions.unshift({ id: chunk.session_id, title: 'New Chat', mode: currentMode, provider, model: currentModelId, created_at: Date.now(), updated_at: new Date().toISOString() });
              }
              sessions = sessions.filter((session, index, arr) => arr.findIndex(other => other.id === session.id) === index);
              renderChatList();
            }
          } else if (chunk.type === 'delta') {
            // Finalize thinking if transitioning
            if (thinkingBlock.style.display !== 'none' && !thinkingBlock.dataset.done) {
              thinkingBlock.dataset.done = '1';
              const secs = ((Date.now() - thinkingStartTime) / 1000).toFixed(0);
              thinkingLabel.textContent = 'Thought for ' + secs + 's';
              thinkingDots.style.display = 'none';
              thinkingBlock.querySelector('.thinking-header').classList.add('collapsed');
              thinkingBody.classList.add('collapsed');
            }
            content += chunk.content;
            contentEl.innerHTML = renderMarkdown(content);
            safeScroll();
          } else if (chunk.type === 'thinking_delta') {
            if (thinkingBlock.style.display === 'none') {
              thinkingBlock.style.display = '';
              thinkingStartTime = Date.now();
            }
            reasoning += chunk.content;
            thinkingBody.textContent = reasoning;
            thinkingBody.scrollTop = thinkingBody.scrollHeight;
            safeScroll();
          } else if (chunk.type === 'tool_start') {
            // Skip internal tools like report_intent
            if (chunk.name === 'report_intent') {
              _toolDivs['_skip_' + chunk.tool_call_id] = true;
            } else {
              const icon = TOOL_ICONS[chunk.name] || TOOL_ICONS.default;
              const toolDiv = document.createElement('div');
              toolDiv.innerHTML = '<div class="tool-block"><div class="tool-header" onclick="toggleCollapse(this)">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>' +
                '<span class="tool-icon">' + icon + '</span><span class="tool-name">' + esc(chunk.name) + '</span>' +
                '<span class="tool-status running"><span class="tool-spinner"></span> Running</span></div>' +
                '<div class="tool-body"><div class="tool-section"><div class="tool-section-label">Arguments</div>' +
                '<pre class="tool-args-pre">' + esc(chunk.arguments ? (typeof chunk.arguments === 'string' ? chunk.arguments : JSON.stringify(chunk.arguments, null, 2)) : '...') + '</pre></div>' +
                '<div class="tool-section"><div class="tool-section-label">Result</div>' +
                '<pre class="tool-result-pre" style="color:var(--text-muted)">Executing...</pre></div></div></div>';
              toolCallsEl.appendChild(toolDiv);
              _toolDivs[chunk.tool_call_id] = { div: toolDiv, name: chunk.name, inputBuf: '' };
              safeScroll();
            }
          } else if (chunk.type === 'tool_input_delta') {
            const tid = chunk.tool_call_id || Object.keys(_toolDivs).filter(k => !k.startsWith('_skip_')).pop();
            if (tid && _toolDivs[tid] && !_toolDivs[tid].div === undefined) {}
            if (tid && _toolDivs[tid] && _toolDivs[tid].div) {
              _toolDivs[tid].inputBuf += chunk.content;
              const pre = _toolDivs[tid].div.querySelector('.tool-args-pre');
              if (pre) pre.textContent = _toolDivs[tid].inputBuf;
            }
          } else if (chunk.type === 'tool_progress') {
            const td = _toolDivs[chunk.tool_call_id];
            if (td && td.div) {
              const pre = td.div.querySelector('.tool-result-pre');
              if (pre) pre.textContent = chunk.message || chunk.content || 'Working...';
            }
          } else if (chunk.type === 'tool_complete') {
            const td = _toolDivs[chunk.tool_call_id];
            if (td && td.div) {
              const statusEl = td.div.querySelector('.tool-status');
              const pre = td.div.querySelector('.tool-result-pre');
              if (chunk.is_error) {
                statusEl.className = 'tool-status error';
                statusEl.innerHTML = '\u2717 Error';
                if (pre) { pre.textContent = chunk.result || chunk.content || '[error]'; pre.style.color = 'var(--red)'; }
              } else {
                statusEl.className = 'tool-status done';
                statusEl.innerHTML = '\u2713 Done';
                if (pre) { pre.textContent = chunk.result || chunk.content || '[ok]'; pre.style.color = ''; }
              }
              td.div.querySelector('.tool-header').classList.add('collapsed');
              td.div.querySelector('.tool-body').classList.add('collapsed');
              _toolCalls.push({ name: td.name, args: td.inputBuf, result: chunk.result || chunk.content || '', error: chunk.is_error || false });
            }
            safeScroll();
          } else if (chunk.type === 'compaction') {
            showToast('Context compacted — older messages summarized');
          } else if (chunk.type === 'done') {
            // Final metadata from server
            costInfo = chunk;
            // Finalize thinking
            if (reasoning && thinkingBlock.style.display !== 'none' && !thinkingBlock.dataset.done) {
              const secs = ((Date.now() - thinkingStartTime) / 1000).toFixed(0);
              thinkingLabel.textContent = 'Thought for ' + secs + 's';
              thinkingDots.style.display = 'none';
              thinkingBlock.querySelector('.thinking-header').classList.add('collapsed');
              thinkingBody.classList.add('collapsed');
            }
          } else if (chunk.type === 'error') {
            content = '**Error:** ' + (chunk.content || chunk.message || 'Unknown error');
            contentEl.innerHTML = renderMarkdown(content);
          }
        } catch(e) {}
      }
    }
  } catch(e) {
    if (e.name === 'AbortError') {
      content += '\n\n*[Generation stopped]*';
    } else {
      content = '**Error:** ' + e.message;
    }
    contentEl.innerHTML = renderMarkdown(content);
  }

  // Show cost badge if available
  if (costInfo && costInfo.cost_usd != null) {
    const badge = document.createElement('div');
    badge.style.cssText = 'font-size:11px;opacity:0.4;text-align:right;margin-top:4px;';
    badge.textContent = '$' + Number(costInfo.cost_usd).toFixed(4);
    if (costInfo.input_tokens || costInfo.output_tokens) {
      badge.textContent += ' (' + (costInfo.input_tokens || 0) + ' in / ' + (costInfo.output_tokens || 0) + ' out)';
    }
    msgEl.appendChild(badge);
  }

  // Save to local state (server already persisted)
  currentMessages.push({ role: 'assistant', content, thinking: reasoning, tool_calls: _toolCalls });

  const actionsDiv = document.createElement('div');
  actionsDiv.innerHTML = msgActionButtons(content);
  msgEl.appendChild(actionsDiv.firstChild);

  msgEl.querySelectorAll('[id^="current"]').forEach(el => el.removeAttribute('id'));
  if (isActive()) { isStreaming = false; if (abortController === myAbort) abortController = null; }
  delete _chatStreaming[streamSessionId];
  delete _chatDomCache[streamSessionId];
  if (isActive()) { updateSendButton(); }
  await loadSessions();
  renderChatList();
  safeScroll();
  if (isActive()) document.getElementById('chatInput')?.focus();
}

function stopGeneration() {
  stopRequested = true;
  if (abortController) {
    try { abortController.abort(); } catch(e) {}
    abortController = null;
  }
  isStreaming = false;
  if (currentSessionId && _chatStreaming[currentSessionId]) {
    _chatStreaming[currentSessionId].stopRequested = true;
    try { _chatStreaming[currentSessionId].abortController.abort(); } catch(e) {}
  }
  updateSendButton();
}

// ===== CHATBOX INTELLIGENCE: History, Trie, @-files =====

// ── Message History (Up/Down arrows) ────────────────────────────────
let _msgHistory = [];  // most recent first
let _msgHistoryIdx = -1;  // -1 = not browsing history
let _msgHistoryDraft = '';  // save current draft when entering history

async function _loadHistory() {
  // History is now managed locally in _msgHistory (populated during sendMessage)
  const saved = localStorage.getItem('unified_msg_history');
  if (saved) {
    try {
      _msgHistory = JSON.parse(saved);
      for (const t of _msgHistory) _sentenceTrieInsert(t);
    } catch(e) {}
  }
}

function _handleHistoryNav(el, direction) {
  // direction: -1 = up (older), +1 = down (newer)
  if (_msgHistoryIdx === -1 && direction === -1) {
    // Start browsing: save current draft
    _msgHistoryDraft = el.value;
    _msgHistoryIdx = 0;
    if (_msgHistory.length > 0) {
      el.value = _msgHistory[0];
      autoResize(el);
    }
    return true;
  }
  if (_msgHistoryIdx >= 0) {
    const newIdx = _msgHistoryIdx + (direction === -1 ? 1 : -1);
    if (newIdx < 0) {
      // Back to draft
      _msgHistoryIdx = -1;
      el.value = _msgHistoryDraft;
      autoResize(el);
      return true;
    }
    if (newIdx < _msgHistory.length) {
      _msgHistoryIdx = newIdx;
      el.value = _msgHistory[newIdx];
      autoResize(el);
      return true;
    }
  }
  return false;
}

// ── Sentence Trie — stores full sentences, searches by prefix ──────
const _sentenceTrie = {};

function _sentenceTrieInsert(sentence) {
  if (!sentence || sentence.length < 2) return;
  let node = _sentenceTrie;
  for (const ch of sentence.toLowerCase()) {
    if (!node[ch]) node[ch] = {};
    node = node[ch];
  }
  node._end = true;
  node._sentence = sentence;  // store original casing
}

function _sentenceTrieSearch(prefix, limit = 5) {
  if (!prefix || prefix.length < 1) return [];
  let node = _sentenceTrie;
  for (const ch of prefix.toLowerCase()) {
    if (!node[ch]) return [];
    node = node[ch];
  }
  // BFS to collect all sentences under this prefix
  const results = [];
  const queue = [node];
  while (queue.length > 0 && results.length < limit) {
    const n = queue.shift();
    if (n._end && n._sentence && n._sentence.toLowerCase() !== prefix.toLowerCase()) {
      results.push(n._sentence);
    }
    for (const k of Object.keys(n)) {
      if (k[0] !== '_') queue.push(n[k]);
    }
  }
  return results;
}

// ── Ghost Text State ────────────────────────────────────────────────
let _ghostSuggestion = '';  // the full suggested sentence
let _ghostTarget = null;

function _getGhostOverlay(el) {
  return document.getElementById(el.id === 'welcomeInput' ? 'welcomeGhost' : 'chatGhost');
}

function _showGhostText(el, fullSentence) {
  const overlay = _getGhostOverlay(el);
  if (!overlay) return;
  const typed = el.value;
  // The completion is the part after what's typed
  const completion = fullSentence.substring(typed.length);
  if (!completion) { _hideGhostText(el); return; }
  _ghostSuggestion = fullSentence;
  _ghostTarget = el;
  overlay.innerHTML = '<span class="ghost-typed">' + esc(typed) + '</span><span class="ghost-completion">' + esc(completion) + '</span>';
}

function _hideGhostText(el) {
  const overlay = _getGhostOverlay(el || _ghostTarget || document.getElementById('chatInput'));
  if (overlay) overlay.innerHTML = '';
  _ghostSuggestion = '';
  _ghostTarget = null;
}

function _acceptGhostText(el) {
  if (!_ghostSuggestion) return false;
  el.value = _ghostSuggestion;
  _hideGhostText(el);
  autoResize(el);
  el.focus();
  return true;
}

// ── Suggestion Dropdown (for @-file only now) ───────────────────────
let _suggestMode = 'none';  // 'none' | 'file'
let _suggestItems = [];
let _suggestActiveIdx = -1;
let _suggestTarget = null;
let _fileSearchTimer = null;

function _getSuggestDropdown(el) {
  const isWelcome = el.id === 'welcomeInput';
  return document.getElementById(isWelcome ? 'welcomeSuggest' : 'chatSuggest');
}

function _showSuggestions(el, items, mode) {
  const dropdown = _getSuggestDropdown(el);
  _suggestMode = mode;
  _suggestItems = items;
  _suggestActiveIdx = -1;
  _suggestTarget = el;

  if (!items.length) {
    dropdown.classList.remove('visible');
    _suggestMode = 'none';
    return;
  }

  dropdown.innerHTML = items.map((item, i) => {
    if (mode === 'file') {
      const name = item.split('/').pop();
      const dir = item.substring(0, item.length - name.length);
      return '<div class="suggest-item suggest-file' + (i === _suggestActiveIdx ? ' active' : '') + '" data-idx="' + i + '">' +
        '<span class="icon">📄</span>' +
        '<span class="text"><span style="opacity:0.5">' + esc(dir) + '</span>' + esc(name) + '</span></div>';
    } else {
      return '<div class="suggest-item suggest-word' + (i === _suggestActiveIdx ? ' active' : '') + '" data-idx="' + i + '">' +
        '<span class="icon">✦</span>' +
        '<span class="text">' + esc(item) + '</span></div>';
    }
  }).join('');

  dropdown.querySelectorAll('.suggest-item').forEach(el => {
    el.addEventListener('mousedown', (e) => {
      e.preventDefault();
      _selectSuggestion(parseInt(el.dataset.idx));
    });
  });

  dropdown.classList.add('visible');
}

function _hideSuggestions(el) {
  const dropdown = _getSuggestDropdown(el || _suggestTarget || document.getElementById('chatInput'));
  dropdown.classList.remove('visible');
  _suggestMode = 'none';
  _suggestItems = [];
  _suggestActiveIdx = -1;
}

function _navigateSuggestion(direction) {
  if (!_suggestItems.length) return false;
  _suggestActiveIdx += direction;
  if (_suggestActiveIdx < 0) _suggestActiveIdx = _suggestItems.length - 1;
  if (_suggestActiveIdx >= _suggestItems.length) _suggestActiveIdx = 0;

  const dropdown = _getSuggestDropdown(_suggestTarget);
  dropdown.querySelectorAll('.suggest-item').forEach((el, i) => {
    el.classList.toggle('active', i === _suggestActiveIdx);
    if (i === _suggestActiveIdx) el.scrollIntoView({ block: 'nearest' });
  });
  return true;
}

function _selectSuggestion(idx) {
  if (idx < 0 || idx >= _suggestItems.length) idx = _suggestActiveIdx;
  if (idx < 0) idx = 0;
  const item = _suggestItems[idx];
  const el = _suggestTarget;

  if (_suggestMode === 'file') {
    const val = el.value;
    const cursor = el.selectionStart;
    let atPos = val.lastIndexOf('@', cursor - 1);
    if (atPos < 0) atPos = 0;
    const before = val.substring(0, atPos);
    const after = val.substring(cursor);
    el.value = before + '@' + item + ' ' + after;
    const newPos = before.length + 1 + item.length + 1;
    el.selectionStart = el.selectionEnd = newPos;
  }

  _hideSuggestions(el);
  _hideGhostText(el);
  autoResize(el);
  el.focus();
}

function _handleInput(el) {
  const val = el.value;
  const cursor = el.selectionStart;

  // Check for @-file mode
  let atPos = -1;
  for (let i = cursor - 1; i >= 0; i--) {
    if (val[i] === '@') { atPos = i; break; }
    if (val[i] === ' ' || val[i] === '\n') break;
  }

  if (atPos >= 0 && (atPos === 0 || /[\s\n]/.test(val[atPos - 1]))) {
    const query = val.substring(atPos + 1, cursor);
    if (query.length >= 1) {
      clearTimeout(_fileSearchTimer);
      _fileSearchTimer = setTimeout(async () => {
        try {
          const resp = await fetch('/api/files?q=' + encodeURIComponent(query) + '&limit=5');
          const files = await resp.json();
          _showSuggestions(el, files, 'file');
        } catch(e) { _hideSuggestions(el); }
      }, 200);
      _hideGhostText(el);
      return;
    }
  }

  // Sentence ghost text — search Trie for full sentence match
  _hideSuggestions(el);
  if (val.length >= 2 && cursor === val.length) {
    const matches = _sentenceTrieSearch(val, 1);
    if (matches.length > 0) {
      _showGhostText(el, matches[0]);
      return;
    }
  }
  _hideGhostText(el);
}

// ===== EVENT LISTENERS =====
['welcomeInput', 'chatInput'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('input', () => { autoResize(el); _handleInput(el); });
  el.addEventListener('keydown', (e) => {
    // File suggestion dropdown navigation
    if (_suggestMode !== 'none') {
      if (e.key === 'ArrowDown') { e.preventDefault(); _navigateSuggestion(1); return; }
      if (e.key === 'ArrowUp') { e.preventDefault(); _navigateSuggestion(-1); return; }
      if (e.key === 'Tab' || (e.key === 'Enter' && _suggestActiveIdx >= 0)) {
        e.preventDefault(); _selectSuggestion(_suggestActiveIdx >= 0 ? _suggestActiveIdx : 0); return;
      }
      if (e.key === 'Escape') { e.preventDefault(); _hideSuggestions(el); return; }
    }

    // Ghost text Tab acceptance
    if (e.key === 'Tab' && _ghostSuggestion) {
      e.preventDefault();
      _acceptGhostText(el);
      return;
    }

    // Escape clears ghost text
    if (e.key === 'Escape' && _ghostSuggestion) {
      _hideGhostText(el);
    }

    // History navigation (only when no suggestions shown and no ghost)
    if (e.key === 'ArrowUp' && !e.shiftKey && _suggestMode === 'none') {
      if (el.selectionStart === 0 || _msgHistoryIdx >= 0) {
        if (_handleHistoryNav(el, -1)) { e.preventDefault(); _hideGhostText(el); return; }
      }
    }
    if (e.key === 'ArrowDown' && !e.shiftKey && _suggestMode === 'none') {
      if (_msgHistoryIdx >= 0) {
        if (_handleHistoryNav(el, 1)) { e.preventDefault(); _hideGhostText(el); return; }
      }
    }

    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      _hideGhostText(el);
      if (isStreaming) return;
      if (el.value.trim()) sendMessage(el.value.trim());
    }
  });
  el.addEventListener('blur', () => { setTimeout(() => { _hideSuggestions(el); _hideGhostText(el); }, 150); });
});
