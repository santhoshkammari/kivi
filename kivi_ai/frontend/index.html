<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kivi — AI Chat</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23D9774F' d='M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5'/%3E%3C/svg%3E">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">Kivi</span>
      <button class="icon-btn" onclick="toggleSidebar()" title="Toggle sidebar">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      </button>
    </div>

    <nav class="nav-items">
      <button class="nav-item" onclick="newChat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New chat
        <span class="shortcut">Ctrl+N</span>
      </button>
      <button class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search
      </button>
      <button class="nav-item" onclick="showChatsDashboard()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Chats
      </button>
      <button class="nav-item" onclick="showAgentsDashboard()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/><path d="M12 12v4M9 14h6"/></svg>
        Agents
        <span class="agents-badge" id="agentsBadge" style="display:none;background:var(--green);color:#fff;font-size:10px;padding:1px 5px;border-radius:8px;margin-left:auto;"></span>
      </button>
      <button class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Projects
      </button>
      <button class="nav-item" onclick="showGitDashboard()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><line x1="12" y1="3" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="21"/><line x1="3" y1="12" x2="9" y2="12"/></svg>
        Git
      </button>
      <button class="nav-item" onclick="showTokenDashboard()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Tokens
      </button>
      <button class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        Code
      </button>
      <button class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Customize
      </button>
      <button class="nav-item-more" onclick="this.querySelector('svg:last-child').style.transform = this.querySelector('svg:last-child').style.transform === 'rotate(180deg)' ? '' : 'rotate(180deg)'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:17px;height:17px;opacity:0.7"><polyline points="6 9 12 15 18 9"/></svg>
        More
      </button>
    </nav>

    <h2 class="section-header">Starred</h2>
    <div class="chat-list" style="flex:none;max-height:60px;overflow:hidden;padding:0 8px">
    </div>

    <h2 class="section-header">Recents</h2>
    <div class="chat-list" id="chatList"></div>

    <div class="sidebar-bottom">
      <button class="nav-item" onclick="openSettings()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </button>
    </div>

    <div class="sidebar-footer">
      <div class="user-avatar" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">S</div>
      <div style="flex:1;min-width:0">
        <div class="user-name">User</div>
        <div class="user-plan">Kivi</div>
      </div>
      <svg style="width:18px;height:18px;color:var(--text-muted);cursor:pointer;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 10l5 5 5-5"/></svg>
    </div>
  </aside>

  <!-- Floating sidebar open button (visible when sidebar collapsed) -->
  <button class="sidebar-open-btn" onclick="toggleSidebar()" title="Open sidebar">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
  </button>

  <!-- Main -->
  <div class="main-content">
    <!-- Chat header (shown when in chat mode) -->
    <div class="chat-header" id="chatHeader" style="display:none;">
      <div class="chat-title-wrapper">
        <span class="chat-title-text" id="chatTitleText">Untitled</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:0.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <button class="share-btn" onclick="showToast('Share copied!')">Share</button>
    </div>
    <!-- Welcome -->
    <div class="welcome-screen" id="welcomeScreen">
      <div class="greeting">
        <svg class="sparkle-icon" width="38" height="38" viewBox="0 0 40 40" fill="none">
          <path d="M20 4L22.5 15.5L34 12L24.5 20L34 28L22.5 24.5L20 36L17.5 24.5L6 28L15.5 20L6 12L17.5 15.5L20 4Z" fill="currentColor"/>
        </svg>
        <h1 id="greetingText">Welcome to Kivi</h1>
      </div>
      <div class="input-area" id="welcomeInputArea">
        <div class="input-box">
          <div class="suggest-dropdown" id="welcomeSuggest"></div>
          <div class="input-inner" style="position:relative;">
          <div class="file-chips" id="welcomeFileChips"></div>
          <div class="ghost-text-wrapper" style="position:relative;">
          <textarea class="input-textarea" id="welcomeInput" placeholder="How can I help you today?" rows="1" style="position:relative;z-index:1;background:transparent;"></textarea>
          <div class="ghost-text-overlay" id="welcomeGhost" aria-hidden="true"></div>
          </div>
          <div class="input-toolbar">
            <div class="toolbar-left">
              <button class="toolbar-btn" title="Attach file" onclick="triggerUpload('welcome')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
              <input type="file" id="welcomeFileInput" multiple accept="image/*,.txt,.py,.js,.ts,.json,.md,.csv,.html,.css,.xml,.yaml,.yml,.toml,.sh,.rs,.go,.java,.c,.cpp,.h,.rb,.php,.sql" hidden>
              <div class="mode-toggle">
                <button class="mode-btn active" data-mode="chat" onclick="setMode('chat')">Chat</button>
                <button class="mode-btn" data-mode="kivi" onclick="setMode('kivi')">Kivi</button>
                <button class="mode-btn" data-mode="copilot" onclick="setMode('copilot')">Copilot</button>
                <button class="mode-btn" data-mode="qwen-copilot" onclick="setMode('qwen-copilot')">QCopilot</button>
                <button class="mode-btn" data-mode="claude" onclick="setMode('claude')">Claude</button>
                <button class="mode-btn" data-mode="qwen-claude" onclick="setMode('qwen-claude')">QClaude</button>
              </div>
            </div>
            <div class="toolbar-right">
              <button class="sampling-badge" onclick="openSettings()" id="samplingBadgeWelcome">thinking</button>
              <select class="model-selector" id="modelSelectorWelcome" onchange="selectModel(this.value)">
                <option value="default">Default Model</option>
              </select>
              <button class="send-btn" id="sendBtnWelcome" title="Send">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
              </button>
            </div>
          </div>
          </div>
        </div>
      </div>
      <div class="quick-actions">
        <button class="quick-action" onclick="sendQuickAction('Write me a short poem')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
          Write
        </button>
        <button class="quick-action" onclick="sendQuickAction('Explain quantum computing simply')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a7 7 0 0 1 7 7c0 2.38-1.19 4.47-3 5.74V17a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 0 1 7-7z"/><line x1="10" y1="22" x2="14" y2="22"/></svg>
          Learn
        </button>
        <button class="quick-action" onclick="sendQuickAction('Write a Python function to sort a list')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          Code
        </button>
        <button class="quick-action" onclick="sendQuickAction('Help me organize my life and plan my tasks')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          Life stuff
        </button>
        <button class="quick-action" onclick="sendQuickAction('Surprise me with something interesting')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
          Kivi's pick
        </button>
      </div>
    </div>

    <!-- Git Dashboard (hidden by default) -->
    <div id="gitDashboard" style="display:none;flex:1;overflow:auto;padding:20px;">
      <div style="width:100%;">
        <h2 style="margin-bottom:16px;font-size:20px;font-weight:600;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align:-3px;margin-right:6px"><circle cx="12" cy="12" r="3"/><line x1="12" y1="3" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="21"/></svg>
          Git Dashboard
        </h2>

        <!-- Search bar -->
        <div style="position:relative;margin-bottom:20px;">
          <input type="text" id="gitSearchInput" placeholder="Search for a git repository folder..."
            style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border-subtle);background:var(--bg-secondary);color:var(--text-primary);font-size:14px;outline:none;"
            oninput="gitSearchDirs(this.value)" onfocus="gitSearchDirs(this.value)">
          <div id="gitSearchResults" style="position:absolute;top:100%;left:0;right:0;z-index:100;background:var(--bg-secondary);border:1px solid var(--border-subtle);border-radius:8px;margin-top:4px;max-height:250px;overflow-y:auto;display:none;"></div>
        </div>

        <!-- Recent repos -->
        <div id="gitRecentRepos" style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;"></div>

        <!-- Current repo info -->
        <div id="gitRepoInfo" style="display:none;">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:12px;border-radius:10px;background:var(--bg-secondary);border:1px solid var(--border-subtle);">
            <div style="flex:1;">
              <div id="gitRepoPath" style="font-size:13px;color:var(--text-muted);font-family:var(--font-mono);"></div>
              <div style="display:flex;align-items:center;gap:10px;margin-top:6px;">
                <span id="gitBranch" style="padding:2px 8px;border-radius:12px;background:rgba(122,174,224,0.15);color:var(--blue);font-size:12px;font-weight:500;"></span>
                <span id="gitChangeCount" style="font-size:12px;color:var(--text-muted);"></span>
              </div>
            </div>
            <div style="display:flex;gap:8px;">
              <button onclick="gitRefresh()" style="padding:6px 12px;border-radius:8px;border:1px solid var(--border-subtle);background:none;color:var(--text-primary);cursor:pointer;font-size:13px;">↻ Refresh</button>
              <button onclick="gitCommitPrompt()" id="gitCommitBtn" style="padding:6px 12px;border-radius:8px;border:none;background:var(--green);color:#fff;cursor:pointer;font-size:13px;display:none;">Commit</button>
              <button onclick="gitPush()" style="padding:6px 12px;border-radius:8px;border:none;background:var(--blue);color:#fff;cursor:pointer;font-size:13px;">Push</button>
            </div>
          </div>

          <!-- Commit message input (hidden until commit clicked) -->
          <div id="gitCommitArea" style="display:none;margin-bottom:16px;padding:12px;border-radius:10px;background:var(--bg-secondary);border:1px solid var(--border-subtle);">
            <input type="text" id="gitCommitMsg" placeholder="Commit message..."
              style="width:calc(100% - 100px);padding:8px 12px;border-radius:8px;border:1px solid var(--border-subtle);background:var(--bg-primary);color:var(--text-primary);font-size:13px;outline:none;"
              onkeydown="if(event.key==='Enter')gitDoCommit()">
            <button onclick="gitDoCommit()" style="padding:8px 16px;border-radius:8px;border:none;background:var(--green);color:#fff;cursor:pointer;font-size:13px;margin-left:8px;">Commit</button>
          </div>

          <!-- Diff view -->
          <div id="gitDiffView" style="font-family:var(--font-mono);font-size:13px;line-height:1.6;"></div>

          <!-- Recent commits -->
          <div id="gitCommitLog" style="margin-top:20px;"></div>
        </div>
      </div>
    </div>

    <!-- Token Dashboard -->
    <div id="tokenDashboard" style="display:none;flex:1;overflow:auto;padding:20px;">
      <div style="width:100%;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
          <h2 style="font-size:22px;font-weight:600;display:flex;align-items:center;gap:8px;">
            🔥 Token Burning
          </h2>
          <button onclick="refreshTokenStats()" id="tokenRefreshBtn" style="padding:8px 16px;border-radius:8px;border:1px solid var(--border-subtle);background:none;color:var(--text-primary);cursor:pointer;font-size:13px;font-weight:500;">↻ Refresh</button>
        </div>

        <!-- Period selector -->
        <div id="tokenPeriodSelector" style="display:flex;gap:4px;margin-bottom:20px;background:var(--bg-surface-alt);border-radius:10px;padding:3px;border:1px solid var(--border-subtle);width:fit-content;">
          <button class="tkn-period active" data-period="today" onclick="setTokenPeriod('today')">Today</button>
          <button class="tkn-period" data-period="week" onclick="setTokenPeriod('week')">Week</button>
          <button class="tkn-period" data-period="month" onclick="setTokenPeriod('month')">Month</button>
          <button class="tkn-period" data-period="all_time" onclick="setTokenPeriod('all_time')">All Time</button>
        </div>

        <!-- Summary cards -->
        <div id="tokenSummaryCards" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;"></div>

        <!-- Insights row -->
        <div id="tokenInsights" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;"></div>

        <!-- Chart area — Plotly -->
        <div style="background:var(--bg-secondary);border-radius:12px;border:1px solid var(--border-subtle);padding:20px;margin-bottom:24px;">
          <div id="tokenPlotlyChart" style="width:100%;height:320px;"></div>
        </div>

        <!-- Per-mode drill down with sub-period selector -->
        <div style="background:var(--bg-secondary);border-radius:12px;border:1px solid var(--border-subtle);padding:20px;margin-bottom:24px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
            <div style="font-size:15px;font-weight:500;color:var(--text-secondary);">By Mode</div>
          </div>
          <div id="tokenModeBreakdown"></div>
        </div>

        <!-- Per-chat breakdown -->
        <div style="background:var(--bg-secondary);border-radius:12px;border:1px solid var(--border-subtle);padding:20px;">
          <div style="font-size:15px;font-weight:500;margin-bottom:14px;color:var(--text-secondary);">Per Chat</div>
          <div id="tokenChatBreakdown"></div>
        </div>
      </div>
    </div>

    <!-- Chats Dashboard -->
    <div id="chatsDashboard" style="display:none;flex:1;overflow:auto;padding:20px;">
      <div style="width:100%;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
          <h2 style="font-size:22px;font-weight:600;">💬 All Chats</h2>
        </div>
        <div style="margin-bottom:16px;">
          <input type="text" id="chatsDashSearchInput" placeholder="Search by title, model, content..."
            oninput="filterChatsDashboard(this.value)"
            style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border-subtle);background:var(--bg-secondary);color:var(--text-primary);font-size:14px;outline:none;box-sizing:border-box;">
        </div>
        <div id="chatsDashList" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;"></div>
      </div>
    </div>

    <!-- Agents Dashboard -->
    <div id="agentsDashboard" style="display:none;flex:1;overflow:auto;padding:20px;">
      <div style="width:100%;max-width:900px;margin:0 auto;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
          <h2 style="font-size:22px;font-weight:600;display:flex;align-items:center;gap:8px;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
            Agents
          </h2>
          <button onclick="refreshAgents()" style="padding:8px 16px;border-radius:8px;border:1px solid var(--border-subtle);background:none;color:var(--text-primary);cursor:pointer;font-size:13px;font-weight:500;">↻ Refresh</button>
        </div>
        <div id="agentsRunningSection">
          <h3 style="font-size:14px;font-weight:500;color:var(--text-muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px;">Running</h3>
          <div id="agentsRunningList" style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px;"></div>
        </div>
        <div id="agentsCompletedSection">
          <h3 style="font-size:14px;font-weight:500;color:var(--text-muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px;">Completed</h3>
          <div id="agentsCompletedList" style="display:flex;flex-direction:column;gap:8px;"></div>
        </div>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages-area" id="messagesArea"></div>

    <!-- Chat input -->
    <div class="input-area" id="chatInputArea" style="display:none;">
      <div class="input-box">
        <div class="suggest-dropdown" id="chatSuggest"></div>
        <div class="input-inner" style="position:relative;">
        <div class="file-chips" id="chatFileChips"></div>
        <div class="ghost-text-wrapper" style="position:relative;">
          <textarea class="input-textarea" id="chatInput" placeholder="Write a message..." rows="1" style="position:relative;z-index:1;background:transparent;"></textarea>
          <div class="ghost-text-overlay" id="chatGhost" aria-hidden="true"></div>
        </div>
        <div class="input-toolbar">
          <div class="toolbar-left">
            <button class="toolbar-btn" title="Attach file" onclick="triggerUpload('chat')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <input type="file" id="chatFileInput" multiple accept="image/*,.txt,.py,.js,.ts,.json,.md,.csv,.html,.css,.xml,.yaml,.yml,.toml,.sh,.rs,.go,.java,.c,.cpp,.h,.rb,.php,.sql" hidden>
            <div class="mode-toggle">
              <button class="mode-btn active" data-mode="chat" onclick="setMode('chat')">Chat</button>
              <button class="mode-btn" data-mode="kivi" onclick="setMode('kivi')">Kivi</button>
              <button class="mode-btn" data-mode="copilot" onclick="setMode('copilot')">Copilot</button>
              <button class="mode-btn" data-mode="qwen-copilot" onclick="setMode('qwen-copilot')">QCopilot</button>
              <button class="mode-btn" data-mode="claude" onclick="setMode('claude')">Claude</button>
              <button class="mode-btn" data-mode="qwen-claude" onclick="setMode('qwen-claude')">QClaude</button>
            </div>
          </div>
          <div class="toolbar-right">
            <button class="sampling-badge" onclick="openSettings()" id="samplingBadgeChat">thinking</button>
            <select class="model-selector" id="modelSelectorChat" onchange="selectModel(this.value)">
              <option value="default">Default Model</option>
            </select>
            <button class="send-btn" id="sendBtnChat" title="Send">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
          </div>
        </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettings()">
  <div class="settings-panel" onclick="event.stopPropagation()">
    <div class="settings-header">
      <h2>Settings</h2>
      <button class="settings-close" onclick="closeSettings()">&times;</button>
    </div>
    <div class="settings-body">
      <div class="settings-group">
        <label>Theme</label>
        <div class="theme-toggle">
          <button class="theme-btn" data-theme="light" onclick="setTheme('light')">&#9788; Light</button>
          <button class="theme-btn active" data-theme="dark" onclick="setTheme('dark')">&#9790; Dark</button>
        </div>
      </div>
      <div class="settings-group">
        <label>Sampling Mode</label>
        <select class="settings-select" id="samplingModeSelect" onchange="setSamplingMode(this.value)">
          <option value="thinking_general">Thinking &mdash; General</option>
          <option value="thinking_coding">Thinking &mdash; Coding</option>
          <option value="instruct_general">Instruct &mdash; General</option>
          <option value="instruct_coding">Instruct &mdash; Coding</option>
          <option value="instruct_reasoning">Instruct &mdash; Reasoning</option>
        </select>
        <div class="param-display" id="paramDisplay"></div>
        <div class="hint">Thinking modes enable extended reasoning. Instruct modes are direct.</div>
      </div>
      <div class="settings-group">
        <label>API Endpoint</label>
        <input class="settings-select" id="apiUrlInput" value="http://192.168.170.49:8077/v1/chat/completions" style="font-family:var(--font-mono);font-size:12px">
        <div class="hint">vLLM endpoint. Change if server moves.</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/static/js/input.js"></script>
<script src="/static/js/agents.js"></script>
<script src="/static/js/dashboards.js"></script>
<script src="/static/js/init.js"></script>
</body>
